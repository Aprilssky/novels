<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}} - InkOS 小说集</title>
<style>
  :root { --bg: #0f0f14; --card: #1a1a24; --accent: #d4a530; --text: #e0e0e0; --muted: #888; --border: #2a2a3a; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Noto Serif SC", "Source Han Serif SC", "STSong", Georgia, serif;
    background: var(--bg); color: var(--text); line-height: 1.9; font-size: 1.05rem;
  }
  .nav {
    max-width: 720px; margin: 0 auto; padding: 1.5rem 1rem;
    display: flex; justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  .nav a { color: var(--accent); text-decoration: none; font-size: 0.9rem; }
  .nav a:hover { text-decoration: underline; }
  .container { max-width: 720px; margin: 0 auto; padding: 2rem 1rem 4rem; }
  h1 { font-size: 1.8rem; margin-bottom: 0.5rem; color: var(--accent); font-weight: 700; }
  .meta { color: var(--muted); font-size: 0.85rem; margin-bottom: 2rem; font-family: sans-serif; }
  .chapter { margin-bottom: 2.5rem; }
  .chapter h2 { font-size: 1.25rem; margin-bottom: 1rem; color: #ccc; border-left: 3px solid var(--accent); padding-left: 0.75rem; }
  .chapter p { text-indent: 2em; margin-bottom: 0.8rem; }
  .tags { margin: 2rem 0; font-family: sans-serif; }
  .tag {
    font-size: 0.75rem; padding: 2px 10px; border-radius: 4px;
    background: rgba(212,165,48,0.15); color: var(--accent);
    border: 1px solid rgba(212,165,48,0.3); display: inline-block; margin: 2px;
  }
  .footer {
    text-align: center; padding: 2rem; color: var(--muted);
    font-size: 0.8rem; border-top: 1px solid var(--border); font-family: sans-serif;
  }
</style>
</head>
<body>
<div class="nav">
  <a href="/novels/">← 返回书库</a>
  <a href="https://github.com/Aprilssky/novels">GitHub</a>
</div>
<div class="container">
  <h1>{{TITLE}}</h1>
  <div class="meta">{{AUTHOR}} · {{DATE}} · {{GENRE}}</div>
  <div class="tags">{{TAGS}}</div>
  {{CONTENT}}
</div>
<div class="footer">由 InkOS 生成 · <a href="https://aprilssky.github.io/novels/" style="color:var(--muted);">InkOS 小说集</a></div>
</body>
</html>
